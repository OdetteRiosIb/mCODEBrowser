<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>mCODE Taxonomy Browser</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.2.1/themes/default/style.min.css" />
    <<style>
        body { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; margin: 0; display: flex; background: #fff; font-family: Arial, sans-serif; }
        #protege-sidebar { width: 380px; border-right: 2px solid #b5c7de; padding: 15px; background: #f4f7fa; display: flex; flex-direction: column; box-sizing: border-box; }
        #protege-sidebar h3 { margin-top: 0; color: #104e8b; font-size: 1.1em; border-bottom: 2px solid #104e8b; padding-bottom: 5px; margin-bottom: 10px; }
        #protege-search { width: 100%; padding: 6px; border: 1px solid #999; border-radius: 3px; box-sizing: border-box; margin-bottom: 10px; font-size: 0.9em; }
        #protege-tree { flex: 1; overflow-y: auto; background: #fff; border: 1px solid #b5c7de; padding: 5px; }
        #protege-inspector { flex: 1; padding: 20px 30px; overflow-y: auto; background-color: #fff; box-sizing: border-box; }
        .class-title { font-size: 1.6em; font-weight: bold; margin-bottom: 15px; color: #000; font-family: 'Times New Roman', Times, serif; }
        .yellow-card { background-color: #fbf3db; border: 1px solid #dcd1b4; padding: 12px 15px; margin-bottom: 15px; border-radius: 2px; }
        .card-label { font-weight: bold; color: #000; font-size: 0.95em; margin-bottom: 4px; }
        .card-value { font-size: 0.95em; color: #222; }
        .value-link { color: #a94442; font-weight: bold; text-decoration: none; }
        .slot-section-title { color: #104e8b; font-weight: bold; font-size: 1.05em; margin: 15px 0 5px 0; display: flex; align-items: center; }
        .slot-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #fff; }
        .slot-table th { background-color: #b9d3ee; color: #000; border: 1px solid #9fb6cd; text-align: left; padding: 5px 8px; font-size: 0.9em; font-weight: normal; }
        .slot-table td { border: 1px solid #b5c7de; padding: 6px 10px; font-size: 0.9em; vertical-align: top; }
        .slot-table tr:nth-child(even) { background-color: #f9fafc; }
        .slot-icon { display: inline-block; width: 12px; height: 12px; background-color: #3a75c4; margin-right: 6px; vertical-align: middle; }
        .prop-tag { font-size: 0.8em; color: #777; font-style: italic; margin-left: 5px; }
    </style>

</head>
<body>

    <div id="protege-sidebar">
        <h3>mCODE Taxonomy Browser</h3>
        <input type="text" id="protege-search" placeholder="Type to filter ontology elements..."/>
        <div id="protege-tree">Assembling ontology nodes...</div>
    </div>
    
    <div id="protege-inspector">
        <p style="color:#666; font-style:italic; margin-top:40px;">Select an entity class from the sidebar tree map to inspect its constraints and SKOS properties.</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.12.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.2.1/jstree.min.js"></script>

    <script>
    $(document).ready(



function() {
        
        // =================================================================
        // PASTE YOUR RAW ONTOLOGY.JSON DATA DIRECTLY BELOW THIS LINE
        // =================================================================
        const vowlData =    
        
        // =================================================================
        // PASTE YOUR RAW ONTOLOGY.JSON DATA DIRECTLY ABOVE THIS LINE
        // =================================================================
        ;

        if (!vowlData) {
            $('#protege-tree').html('<span style="color:red; font-weight:bold;">Error: No dataset detected.</span>');
            return;
        }

        let globalNodeRegistry = {};
        let rawClasses = vowlData.class || [];
        let attributesList = vowlData.classAttribute || [];
        let propertiesList = vowlData.property || [];
        let propertyAttributes = vowlData.propertyAttribute || [];

        function extractAnnotation(field) {
            if (!field) return '';
            if (typeof field === 'object') {
                return field.en || field['en-us'] || field['undefined'] || Object.values(field)[0] || '';
            }
            return field;
        }

        // 1. Initial Pass: Map every class entity with comprehensive structural hooks
        rawClasses.forEach(classObj => {
            const uniqueId = classObj.id;
            const attr = attributesList.find(a => a.id === uniqueId) || {};
            if (classObj.type === "rdfs:Literal" || attr.type === "rdfs:Literal" || uniqueId.toLowerCase().includes('literal')) return;

            let rdfsLabel = extractAnnotation(attr.label);
            let fallbackName = (classObj.iri || "").split('#').pop().split('/').pop().replace(/_/g, ' ');

            let prefLabel = 'N/A';
            let altLabel = 'N/A';
            let skosDef = extractAnnotation(attr.description || attr.comment);

            // Exhaustive nested check for SKOS properties inside custom metadata arrays
            if (attr.annotations) {
                for (let key in attr.annotations) {
                    let cleanKey = key.toLowerCase();
                    let targetArray = attr.annotations[key];
                    let extractedVal = '';
                    
                    if (Array.isArray(targetArray) && targetArray.length > 0) {
                        extractedVal = extractAnnotation(targetArray[0].value || targetArray[0]);
                    } else {
                        extractedVal = extractAnnotation(targetArray);
                    }

                    if (cleanKey.includes('definition')) skosDef = extractedVal;
                    if (cleanKey.includes('preflabel')) prefLabel = extractedVal;
                    if (cleanKey.includes('altlabel')) altLabel = extractedVal;
                }
            }

            let displayName = rdfsLabel || (prefLabel !== 'N/A' ? prefLabel : fallbackName) || "Unnamed Class";

            globalNodeRegistry[uniqueId] = {
                id: uniqueId, 
                text: displayName, 
                parent: '#', 
                meta: { 
                    type: 'Class', 
                    iri: classObj.iri || attr.iri, 
                    rdfsLabel: rdfsLabel || 'N/A',
                    prefLabel: prefLabel,
                    altLabel: altLabel,
                    comment: skosDef || 'No explicit description found.', 
                    superclasses: [], 
                    subclasses: [], 
                    slots: [] 
                }
            };
        });

        // 2. Second Pass: Trace Hierarchy Tree-Nesting AND map Class Properties (Slots)
        propertiesList.forEach(prop => {
            const propId = prop.id;
            const attr = propertyAttributes.find(a => a.id === propId) || {};
            
            let name = extractAnnotation(attr.label) || (prop.iri || "").split('#').pop().split('/').pop();
            let comment = extractAnnotation(attr.comment || attr.description) || 'No explicit description.';
            let domainId = attr.domain;
            let rangeId = attr.range;

            if (prop.type === "rdfs:subClassOf" || prop.type === "subClassOf") {
                if (domainId && rangeId && globalNodeRegistry[domainId] && globalNodeRegistry[rangeId]) {
                    // Force nesting hierarchy for visual tree structure layout
                    globalNodeRegistry[domainId].parent = rangeId;
                    
                    if (!globalNodeRegistry[rangeId].meta.subclasses.includes(globalNodeRegistry[domainId].text)) {
                        globalNodeRegistry[rangeId].meta.subclasses.push(globalNodeRegistry[domainId].text);
                    }
                    if (!globalNodeRegistry[domainId].meta.superclasses.includes(globalNodeRegistry[rangeId].text)) {
                        globalNodeRegistry[domainId].meta.superclasses.push(globalNodeRegistry[rangeId].text);
                    }
                }
            } 
            else if (prop.type === "owl:objectProperty" || prop.type === "owl:ObjectProperty" || prop.type === "objectProperty") {
                if (domainId && globalNodeRegistry[domainId]) {
                    let targetRangeName = globalNodeRegistry[rangeId] ? globalNodeRegistry[rangeId].text : (rangeId || 'OWL:Thing');
                    globalNodeRegistry[domainId].meta.slots.push({ name: name, type: 'Object Property', range: targetRangeName, comment: comment });
                }
            } 
            else if (prop.type === "owl:datatypeProperty" || prop.type === "owl:DatatypeProperty" || prop.type === "datatypeProperty") {
                if (domainId && globalNodeRegistry[domainId]) {
                    let targetRangeName = globalNodeRegistry[rangeId] ? globalNodeRegistry[rangeId].text : (rangeId || 'Literal Value');
                    globalNodeRegistry[domainId].meta.slots.push({ name: name, type: 'Data Property', range: targetRangeName, comment: comment });
                }
            }
        });

        // Clear orphan references that point to structural gaps
        Object.keys(globalNodeRegistry).forEach(key => {
            let node = globalNodeRegistry[key];
            if (node.parent !== '#' && !globalNodeRegistry[node.parent]) {
                node.parent = '#';
            }
        });

        // 3. Mount jSTree Interface Layout Engine
        $('#protege-tree').jstree("destroy").jstree({
            'core': { 
                'data': Object.values(globalNodeRegistry), 
                'themes': { 'variant': 'large', 'icons': true } 
            },
            'plugins': ["search"]
        });

        $('#protege-search').keyup(function () {
            $('#protege-tree').jstree(true).search($(this).val());
        });

        // 4. Update Click Event Inspector Data Panels
        $('#protege-tree').on("changed.jstree", function (e, data) {
            if(!data.selected.length) return;
            const node = globalNodeRegistry[data.selected[0]];
            const m = node.meta;
            let html = "";

            let supers = m.superclasses.length ? m.superclasses.map(s => `<span class="value-link">○ ${s}</span>`).join(', ') : 'None';
            let subs = m.subclasses.length ? m.subclasses.map(s => `<span class="value-link">● ${s}</span>`).join(', ') : 'None';
            let rows = "";
            
            if (m.slots.length) {
                m.slots.forEach(s => {
                    let pillColor = s.type === 'Data Property' ? '#1e7e34' : '#0056b3';
                    rows += `<tr>
                        <td>
                            <div class="slot-icon" style="background-color:${pillColor};"></div>
                            <strong>${s.name}</strong> 
                            <span class="prop-tag" style="color:${pillColor}; font-weight:bold;">[${s.type}]</span>
                        </td>
                        <td>${s.comment}</td>
                        <td><code>${s.range}</code></td>
                    </tr>`;
                });
            } else {
                rows = `<tr><td colspan="3" style="color:#888; font-style:italic; text-align:center;">No Object Properties or Data Properties mapped to this entity domain.</td></tr>`;
            }

            html = `
                <div class="class-title">Class: ${node.text}</div>
                
                <div class="yellow-card">
                    <div class="card-label">skos:definition / Annotation:</div>
                    <div class="card-value">${m.comment}</div>
                </div>

                <div class="yellow-card" style="background-color: #f4f6f8; border-color: #d1d5db;">
                    <div class="card-label" style="color: #4b5563;">Lexical Tracking Labels</div>
                    <div class="card-value" style="font-size: 0.9em; line-height: 1.6em;">
                        <strong>rdfs:label:</strong> <code>${m.rdfsLabel}</code><br/>
                        <strong>skos:prefLabel:</strong> <code>${m.prefLabel}</code><br/>
                        <strong>skos:altLabel:</strong> <span style="color:#555;">${m.altLabel}</span>
                    </div>
                </div>

                <div class="yellow-card">
                    <div class="card-label">Superclasses Hierarchy</div>
                    <div class="card-value">${supers}</div>
                </div>

                <div class="yellow-card">
                    <div class="card-label">Subclasses Hierarchy</div>
                    <div class="card-value">${subs}</div>
                </div>

                <div class="slot-section-title">Class Properties (Object & Data Properties)</div>
                <table class="slot-table">
                    <thead><tr><th>Property Name</th><th>Documentation</th><th>Range Target Value</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div style="margin-top:25px; font-size:0.8em; color:#666;">System IRI Location: <code>${m.iri}</code></div>`;
                
            $('#protege-inspector').html(html);
        });
    });
    </script>
</body>
</html>
